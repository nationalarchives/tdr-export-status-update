name: TDR Run Lambda Tests
on:
  push:
    branches-ignore:
      - main
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@c0b42964f83e17530bde64ce2c987a4c355f7fe7 # v0.0.19
    with:
      repo-name: tdr-export-status-update
      test-command: |
        sbt scalastyle test:scalastyle test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
